<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Database</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      /* === BASE RESET === */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background-color: #ffffff;
        color: #000000;
        font-size: 14px;
        line-height: 1.4;
        height: 100vh;
        overflow: hidden;
      }

      /* === LAYOUT === */
      .app {
        display: flex;
        height: 100vh;
      }

      /* === SIDEBAR === */
      .sidebar {
        width: 240px;
        background-color: #fafafa;
        border-right: 1px solid #e5e5e5;
        padding: 24px 0;
        flex-shrink: 0;
      }

      .sidebar-section {
        padding: 0 0 24px;
        margin-bottom: 24px;
        border-bottom: 1px solid #e5e5e5;
      }

      .sidebar-section:last-child {
        border-bottom: none;
      }

      .sidebar-item {
        display: flex;
        align-items: center;
        padding: 12px 20px;
        color: #666666;
        text-decoration: none;
        transition: all 0.15s;
      }

      .sidebar-item:hover {
        background-color: #f0f0f0;
        color: #000000;
      }

      .sidebar-item.active {
        background-color: #000000;
        color: #ffffff;
      }

      .sidebar-item i {
        width: 20px;
        margin-right: 12px;
        text-align: center;
      }

      .sidebar-title {
        padding: 0 20px 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #999999;
      }

      /* === MAIN CONTENT === */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* === TOP BAR === */
      .top-bar {
        height: 64px;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #e5e5e5;
        background-color: #ffffff;
      }

      .module-info {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .module-icon {
        width: 32px;
        height: 32px;
        background-color: #000000;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
      }

      .module-name {
        font-size: 18px;
        font-weight: 500;
      }

      .module-count {
        color: #666666;
        font-size: 13px;
      }

      .action-bar {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* === SEARCH === */
      .search-wrapper {
        position: relative;
      }

      .search-input {
        width: 280px;
        padding: 10px 16px 10px 40px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background-color: #fafafa;
        font-size: 13px;
        transition: all 0.15s;
      }

      .search-input:focus {
        outline: none;
        background-color: #ffffff;
        border-color: #000000;
      }

      .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #999999;
        font-size: 13px;
      }

      /* === BUTTONS === */
      .btn {
        padding: 10px 16px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background-color: #ffffff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn:hover {
        background-color: #f5f5f5;
        border-color: #d5d5d5;
      }

      .btn-primary {
        background-color: #000000;
        color: #ffffff;
        border-color: #000000;
      }

      .btn-primary:hover {
        background-color: #333333;
        border-color: #333333;
      }

      /* === FILTER BAR === */
      .filter-bar {
        padding: 16px 24px;
        background-color: #fafafa;
        border-bottom: 1px solid #e5e5e5;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .filter-tabs {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .filter-tab {
        padding: 8px 16px;
        border: 1px solid #e5e5e5;
        border-radius: 6px;
        background-color: #ffffff;
        font-size: 13px;
        color: #666666;
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-tab:hover {
        background-color: #f5f5f5;
      }

      .filter-tab.active {
        background-color: #000000;
        color: #ffffff;
        border-color: #000000;
      }

      .view-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .view-btn {
        width: 32px;
        height: 32px;
        border: 1px solid #e5e5e5;
        border-radius: 6px;
        background-color: #ffffff;
        color: #666666;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
      }

      .view-btn:hover {
        background-color: #f5f5f5;
        color: #000000;
      }

      .view-btn.active {
        background-color: #f0f0f0;
        color: #000000;
        border-color: #000000;
      }

      /* === DATABASE AREA === */
      .database {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .database-header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e5e5;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .record-info {
        font-size: 13px;
        color: #666666;
      }

      /* === TABLE === */
      .table-container {
        flex: 1;
        overflow: auto;
        position: relative;
      }

      .table-wrapper {
        min-width: 100%;
        display: inline-block;
      }

      .table {
        width: 100%;
        border-collapse: collapse;
        background-color: #ffffff;
      }

      .table thead {
        position: sticky;
        top: 0;
        background-color: #ffffff;
        z-index: 10;
        border-bottom: 2px solid #000000;
      }

      .table th {
        padding: 16px;
        text-align: left;
        font-weight: 600;
        font-size: 13px;
        color: #000000;
        border-right: 1px solid #e5e5e5;
        white-space: nowrap;
        position: relative;
        min-width: 150px;
      }

      .table th:last-child {
        border-right: none;
        min-width: 100px;
      }

      .table td {
        padding: 14px 16px;
        border-bottom: 1px solid #f0f0f0;
        font-size: 13px;
        color: #000000;
        border-right: 1px solid #f0f0f0;
        vertical-align: top;
      }

      .table td:last-child {
        border-right: none;
      }

      .table tr:hover td {
        background-color: #fafafa;
      }

      .type-badge {
        display: inline-block;
        padding: 3px 8px;
        background-color: #f0f0f0;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        color: #666666;
        margin-left: 8px;
      }

      .column-actions {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0;
        transition: opacity 0.15s;
      }

      .table th:hover .column-actions {
        opacity: 1;
      }

      .column-action {
        background: none;
        border: none;
        color: #999999;
        cursor: pointer;
        padding: 4px;
        font-size: 12px;
      }

      .column-action:hover {
        color: #000000;
      }

      /* === CELL CONTENT === */
      .cell-input {
        width: 100%;
        border: none;
        background: none;
        font-size: 13px;
        color: #000000;
        outline: none;
        padding: 0;
      }

      .cell-input:focus {
        background-color: #ffffff;
      }

      .cell-select {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #e5e5e5;
        border-radius: 4px;
        background-color: #ffffff;
        font-size: 13px;
        color: #000000;
        outline: none;
        cursor: pointer;
      }

      .cell-select:focus {
        border-color: #000000;
      }

      .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
        background-color: #f0f0f0;
        color: #666666;
      }

      .status-active {
        background-color: #e8f5e8;
        color: #2e7d32;
      }

      .status-onleave {
        background-color: #fff8e1;
        color: #f57c00;
      }

      /* === ADD COLUMN BUTTON === */
      .add-column-cell {
        border-left: 2px dashed #d5d5d5;
        text-align: center;
        cursor: pointer;
        color: #999999;
        transition: all 0.15s;
        min-width: 180px;
      }

      .add-column-cell:hover {
        border-color: #000000;
        color: #000000;
        background-color: #fafafa;
      }

      /* === MODAL === */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal {
        background-color: #ffffff;
        border-radius: 12px;
        width: 420px;
        max-width: 90%;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      }

      .modal-header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e5e5;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .modal-title {
        font-size: 16px;
        font-weight: 600;
      }

      .modal-close {
        background: none;
        border: none;
        color: #999999;
        cursor: pointer;
        font-size: 18px;
        padding: 4px;
      }

      .modal-close:hover {
        color: #000000;
      }

      .modal-body {
        padding: 24px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 500;
        color: #000000;
      }

      .form-input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e5e5e5;
        border-radius: 6px;
        font-size: 13px;
        color: #000000;
        background-color: #ffffff;
        outline: none;
        transition: border-color 0.15s;
      }

      .form-input:focus {
        border-color: #000000;
      }

      .type-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 8px;
      }

      .type-card {
        padding: 12px;
        border: 1px solid #e5e5e5;
        border-radius: 6px;
        background-color: #ffffff;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
      }

      .type-card:hover {
        border-color: #000000;
        background-color: #fafafa;
      }

      .type-card.active {
        border-color: #000000;
        background-color: #000000;
        color: #ffffff;
      }

      .type-icon {
        font-size: 18px;
        margin-bottom: 6px;
        display: block;
      }

      .type-name {
        font-size: 12px;
        font-weight: 500;
      }

      .options-area {
        margin-top: 20px;
        padding: 16px;
        background-color: #fafafa;
        border-radius: 6px;
        border: 1px solid #e5e5e5;
      }

      .options-textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #e5e5e5;
        border-radius: 4px;
        background-color: #ffffff;
        font-size: 13px;
        resize: vertical;
        min-height: 80px;
      }

      .modal-footer {
        padding: 20px 24px;
        border-top: 1px solid #e5e5e5;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
      }

      /* === PAGINATION === */
      .pagination {
        padding: 20px 24px;
        border-top: 1px solid #e5e5e5;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background-color: #ffffff;
      }

      .page-btn {
        width: 32px;
        height: 32px;
        border: 1px solid #e5e5e5;
        border-radius: 6px;
        background-color: #ffffff;
        color: #000000;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        transition: all 0.15s;
      }

      .page-btn:hover {
        background-color: #f5f5f5;
      }

      .page-btn.active {
        background-color: #000000;
        color: #ffffff;
        border-color: #000000;
      }

      /* === UTILITY === */
      .hidden {
        display: none;
      }

      /* === SCROLLBAR === */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f5f5f5;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb {
        background: #d5d5d5;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #b5b5b5;
      }

      /* === ANIMATIONS === */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.2s ease;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">Workspace</div>
          <a href="#" class="sidebar-item active">
            <i class="fas fa-users"></i>
            <span>Human Resources</span>
          </a>
          <a href="#" class="sidebar-item">
            <i class="fas fa-box"></i>
            <span>Inventory</span>
          </a>
          <a href="#" class="sidebar-item">
            <i class="fas fa-car"></i>
            <span>Vehicles</span>
          </a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">Views</div>
          <a href="#" class="sidebar-item">
            <i class="fas fa-table"></i>
            <span>Table View</span>
          </a>
          <a href="#" class="sidebar-item">
            <i class="fas fa-th-large"></i>
            <span>Card View</span>
          </a>
          <a href="#" class="sidebar-item">
            <i class="fas fa-chart-bar"></i>
            <span>Analytics</span>
          </a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">Settings</div>
          <a href="#" class="sidebar-item">
            <i class="fas fa-cog"></i>
            <span>Database Settings</span>
          </a>
          <a href="#" class="sidebar-item">
            <i class="fas fa-user-cog"></i>
            <span>Permissions</span>
          </a>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="main">
        <!-- TOP BAR -->
        <div class="top-bar">
          <div class="module-info">
            <div class="module-icon">
              <i class="fas fa-users"></i>
            </div>
            <div>
              <div class="module-name">Human Resources</div>
              <div class="module-count">48 employees in database</div>
            </div>
          </div>
          <div class="action-bar">
            <div class="search-wrapper">
              <i class="fas fa-search search-icon"></i>
              <input
                type="text"
                class="search-input"
                placeholder="Search employees..."
              />
            </div>
            <button class="btn">
              <i class="fas fa-filter"></i>
              Filter
            </button>
            <button class="btn">
              <i class="fas fa-download"></i>
              Export
            </button>
            <button class="btn btn-primary" id="addEmployeeBtn">
              <i class="fas fa-plus"></i>
              Add Employee
            </button>
          </div>
        </div>

        <!-- FILTER BAR -->
        <div class="filter-bar">
          <div class="filter-tabs">
            <button class="filter-tab active">All</button>
            <button class="filter-tab">Active</button>
            <button class="filter-tab">On Leave</button>
            <button class="filter-tab">Managers</button>
            <button class="filter-tab">
              <i class="fas fa-sliders-h"></i>
              More Filters
            </button>
          </div>
          <div class="view-controls">
            <button class="view-btn active">
              <i class="fas fa-table"></i>
            </button>
            <button class="view-btn">
              <i class="fas fa-th-large"></i>
            </button>
            <button class="view-btn">
              <i class="fas fa-chart-bar"></i>
            </button>
          </div>
        </div>

        <!-- DATABASE AREA -->
        <div class="database">
          <div class="database-header">
            <div class="record-info">Showing 48 of 48 employees</div>
            <button class="btn" id="addColumnBtn">
              <i class="fas fa-plus"></i>
              Add Column
            </button>
          </div>

          <!-- TABLE -->
          <div class="table-container">
            <div class="table-wrapper">
              <table class="table">
                <thead id="tableHeader">
                  <!-- Columns will be added here -->
                </thead>
                <tbody id="tableBody">
                  <!-- Rows will be added here -->
                </tbody>
              </table>
            </div>
          </div>

          <!-- PAGINATION -->
          <div class="pagination">
            <button class="page-btn">
              <i class="fas fa-chevron-left"></i>
            </button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <span style="margin: 0 8px; color: #999999">...</span>
            <button class="page-btn">8</button>
            <button class="page-btn">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ADD COLUMN MODAL -->
    <div class="modal-overlay" id="addColumnModal">
      <div class="modal fade-in">
        <div class="modal-header">
          <div class="modal-title">Add New Column</div>
          <button class="modal-close" id="closeColumnModal">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Column Name</label>
            <input
              type="text"
              class="form-input"
              id="columnName"
              placeholder="Phone number, date of birth, etc."
            />
          </div>

          <div class="form-group">
            <label class="form-label">Data Type</label>
            <div class="type-grid" id="typeGrid">
              <div class="type-card active" data-type="text">
                <i class="fas fa-font type-icon"></i>
                <div class="type-name">Text</div>
              </div>
              <div class="type-card" data-type="number">
                <i class="fas fa-hashtag type-icon"></i>
                <div class="type-name">Number</div>
              </div>
              <div class="type-card" data-type="select">
                <i class="fas fa-list type-icon"></i>
                <div class="type-name">Select</div>
              </div>
              <div class="type-card" data-type="date">
                <i class="fas fa-calendar type-icon"></i>
                <div class="type-name">Date</div>
              </div>
              <div class="type-card" data-type="phone">
                <i class="fas fa-phone type-icon"></i>
                <div class="type-name">Phone</div>
              </div>
              <div class="type-card" data-type="email">
                <i class="fas fa-envelope type-icon"></i>
                <div class="type-name">Email</div>
              </div>
            </div>
          </div>

          <div class="options-area hidden" id="optionsArea">
            <label class="form-label">Options (one per line)</label>
            <textarea
              class="options-textarea"
              id="optionsTextarea"
              placeholder="Active&#10;On Leave&#10;Inactive"
            ></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn" id="cancelColumnBtn">Cancel</button>
          <button class="btn btn-primary" id="createColumnBtn">
            Add Column
          </button>
        </div>
      </div>
    </div>

            Position: "HR Manager",
            Status: "Active",
            Email: "lisa.a@company.com",
            Phone: "+1-555-0127",
            "Hire Date": "2020-06-15",
          },
          {
            id: 6,
            "Employee ID": "HR-006",
            "Full Name": "Robert Kim",
            Department: "Engineering",
            Position: "DevOps Engineer",
            Status: "Active",
            Email: "robert.k@company.com",
            Phone: "+1-555-0128",
            "Hire Date": "2023-03-01",
          },
        ],
      };

      // App state
      let selectedDataType = "text";
      let nextColumnId = 9;

      // DOM elements
      const addColumnBtn = document.getElementById("addColumnBtn");
      const addColumnModal = document.getElementById("addColumnModal");
      const closeColumnModal = document.getElementById("closeColumnModal");
      const cancelColumnBtn = document.getElementById("cancelColumnBtn");
      const createColumnBtn = document.getElementById("createColumnBtn");
      const columnNameInput = document.getElementById("columnName");
      const typeCards = document.querySelectorAll(".type-card");
      const optionsArea = document.getElementById("optionsArea");
      const tableHeader = document.getElementById("tableHeader");
      const tableBody = document.getElementById("tableBody");
      const searchInput = document.querySelector(".search-input");
      const addEmployeeBtn = document.getElementById("addEmployeeBtn");

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        renderTable();
        setupEventListeners();
      });

      function setupEventListeners() {
        // Add column button
        addColumnBtn.addEventListener("click", openAddColumnModal);

        // Modal controls
        closeColumnModal.addEventListener("click", closeAddColumnModal);
        cancelColumnBtn.addEventListener("click", closeAddColumnModal);

        // Type selection
        typeCards.forEach((card) => {
          card.addEventListener("click", function () {
            typeCards.forEach((c) => c.classList.remove("active"));
            this.classList.add("active");
            selectedDataType = this.getAttribute("data-type");

            // Show options area for select type
            if (selectedDataType === "select") {
              optionsArea.classList.remove("hidden");
            } else {
              optionsArea.classList.add("hidden");
            }
          });
        });

        // Create column
        createColumnBtn.addEventListener("click", createNewColumn);

        // Add employee
        addEmployeeBtn.addEventListener("click", addNewEmployee);

        // Search
        searchInput.addEventListener("input", filterTable);

        // Filter tabs
        document.querySelectorAll(".filter-tab").forEach((tab) => {
          tab.addEventListener("click", function () {
            document
              .querySelectorAll(".filter-tab")
              .forEach((t) => t.classList.remove("active"));
            this.classList.add("active");

            const filter = this.textContent.trim();
            applyFilter(filter);
          });
        });
      }

      function renderTable() {
        // Clear table
        tableHeader.innerHTML = "";
        tableBody.innerHTML = "";

        // Render header
        hrDatabase.columns.forEach((column) => {
          const th = document.createElement("th");
          th.innerHTML = `
                    ${column.name}
                    <span class="type-badge">${column.type}</span>
                    <div class="column-actions">
                        <button class="column-action rename-column" title="Rename">
                            <i class="fas fa-pencil-alt"></i>
                        </button>
                        <button class="column-action delete-column" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
          th.setAttribute("data-column-id", column.id);
          tableHeader.appendChild(th);
        });

        // Add column cell
        const addTh = document.createElement("th");
        addTh.className = "add-column-cell";
        addTh.innerHTML = `
                <i class="fas fa-plus"></i> Add Column
            `;
        addTh.addEventListener("click", openAddColumnModal);
        tableHeader.appendChild(addTh);

        // Render rows
        hrDatabase.rows.forEach((row) => {
          const tr = document.createElement("tr");

          hrDatabase.columns.forEach((column) => {
            const td = document.createElement("td");
            const value =
              row[column.name] !== undefined ? row[column.name] : "";

            if (column.name === "Status") {
              td.innerHTML = `<span class="status-badge status-${value.toLowerCase().replace(" ", "")}">${value}</span>`;
            } else if (column.type === "select") {
              let options = "";
              if (column.options) {
                options = column.options
                  .map(
                    (opt) =>
                      `<option value="${opt}" ${value === opt ? "selected" : ""}>${opt}</option>`,
                  )
                  .join("");
              }
              td.innerHTML = `<select class="cell-select" data-column="${column.name}">
                            <option value="">Select...</option>
                            ${options}
                        </select>`;
            } else if (column.type === "date") {
              td.innerHTML = `<input type="date" class="cell-input" value="${value}" data-column="${column.name}">`;
            } else {
              td.innerHTML = `<input type="text" class="cell-input" value="${value}" data-column="${column.name}">`;
            }

            tr.appendChild(td);
          });

          // Empty cell for add column alignment
          const emptyTd = document.createElement("td");
          tr.appendChild(emptyTd);

          tableBody.appendChild(tr);
        });

        // Add column action listeners
        addColumnActionListeners();
      }

      function addColumnActionListeners() {
        // Rename column
        document.querySelectorAll(".rename-column").forEach((btn) => {
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            const columnId = this.closest("th").getAttribute("data-column-id");
            renameColumn(columnId);
          });
        });

        // Delete column
        document.querySelectorAll(".delete-column").forEach((btn) => {
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            const columnId = this.closest("th").getAttribute("data-column-id");
            deleteColumn(columnId);
          });
        });

        // Cell input changes
        document
          .querySelectorAll(".cell-input, .cell-select")
          .forEach((input) => {
            input.addEventListener("change", function () {
              const columnName = this.getAttribute("data-column");
              const row = this.closest("tr");
              const rowIndex = Array.from(tableBody.children).indexOf(row);

              if (rowIndex !== -1 && hrDatabase.rows[rowIndex]) {
                hrDatabase.rows[rowIndex][columnName] = this.value;
              }
            });
          });
      }

      function openAddColumnModal() {
        columnNameInput.value = "";
        typeCards[0].click(); // Select text by default
        addColumnModal.classList.add("active");
      }

      function closeAddColumnModal() {
        addColumnModal.classList.remove("active");
      }

      function createNewColumn() {
        const columnName = columnNameInput.value.trim();
        if (!columnName) {
          alert("Please enter a column name");
          return;
        }

        if (hrDatabase.columns.some((col) => col.name === columnName)) {
          alert("A column with this name already exists");
          return;
        }

        const newColumn = {
          id: nextColumnId++,
          name: columnName,
          type: selectedDataType,
        };

        if (selectedDataType === "select") {
          const optionsText = document.getElementById("optionsTextarea").value;
          newColumn.options = optionsText
            .split("\n")
            .map((opt) => opt.trim())
            .filter((opt) => opt);

          if (newColumn.options.length === 0) {
            newColumn.options = ["Option 1", "Option 2", "Option 3"];
          }
        }

        hrDatabase.columns.push(newColumn);
        hrDatabase.rows.forEach((row) => (row[columnName] = ""));

        closeAddColumnModal();
        renderTable();
      }

      function renameColumn(columnId) {
        const column = hrDatabase.columns.find((col) => col.id == columnId);
        if (column) {
          const newName = prompt("Enter new column name:", column.name);
          if (newName && newName.trim() && newName !== column.name) {
            if (
              hrDatabase.columns.some(
                (col) => col.name === newName && col.id != columnId,
              )
            ) {
              alert("A column with this name already exists");
              return;
            }

            const oldName = column.name;
            column.name = newName;

            hrDatabase.rows.forEach((row) => {
              if (row.hasOwnProperty(oldName)) {
                row[newName] = row[oldName];
                delete row[oldName];
              }
            });

            renderTable();
          }
        }
      }

      function deleteColumn(columnId) {
        if (!confirm("Are you sure you want to delete this column?")) return;

        const columnIndex = hrDatabase.columns.findIndex(
          (col) => col.id == columnId,
        );
        if (columnIndex !== -1) {
          const columnName = hrDatabase.columns[columnIndex].name;
          hrDatabase.columns.splice(columnIndex, 1);
          hrDatabase.rows.forEach((row) => delete row[columnName]);
          renderTable();
        }
      }

      function addNewEmployee() {
        const newId = `HR-${String(hrDatabase.rows.length + 1).padStart(3, "0")}`;
        const newEmployee = { id: hrDatabase.rows.length + 1 };

        hrDatabase.columns.forEach((column) => {
          if (column.name === "Employee ID") {
            newEmployee[column.name] = newId;
          } else if (column.name === "Status") {
            newEmployee[column.name] = "Active";
          } else {
            newEmployee[column.name] = "";
          }
        });

        hrDatabase.rows.push(newEmployee);
        renderTable();
      }

      function filterTable() {
        const searchTerm = searchInput.value.toLowerCase();

        document.querySelectorAll("#tableBody tr").forEach((row, index) => {
          let rowText = "";
          hrDatabase.columns.forEach((column) => {
            rowText += " " + (hrDatabase.rows[index][column.name] || "");
          });

          if (searchTerm && !rowText.toLowerCase().includes(searchTerm)) {
            row.style.display = "none";
          } else {
            row.style.display = "";
          }
        });
      }

      function applyFilter(filter) {
        document.querySelectorAll("#tableBody tr").forEach((row, index) => {
          const status = hrDatabase.rows[index]["Status"];

          switch (filter) {
            case "All":
              row.style.display = "";
              break;
            case "Active":
              row.style.display = status === "Active" ? "" : "none";
              break;
            case "On Leave":
              row.style.display = status === "On Leave" ? "" : "none";
              break;
            case "Managers":
              const position = hrDatabase.rows[index]["Position"] || "";
              row.style.display = position.toLowerCase().includes("manager")
                ? ""
                : "none";
              break;
            default:
              row.style.display = "";
          }
        });
      }
    </script>
  </body>
</html>
